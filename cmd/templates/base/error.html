{{ define "error" }}
<div class="alert alert-{{.type}} alert-dismissible fade show d-flex align-items-center gap-2 mt-3" role="alert">
    {{ if eq .type "danger" }}⚠️{{ else }}ℹ️{{ end }}
    <span>{{ .err }}</span>
    <button type="button" class="btn-close ms-auto" data-bs-dismiss="alert" aria-label="Cerrar"></button>
</div>
{{ end }}
