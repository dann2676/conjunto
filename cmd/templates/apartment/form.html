{{ define "apartment/form" }}

<h6 class="fw-semibold mb-3">
    {{ if .is_edit }}✏️ Editar Apartamento{{ else }}➕ Nuevo Apartamento{{ end }}
</h6>

<form {{ if .is_edit }}hx-put="/apartments/{{.apartment.ID}}"{{else}}hx-post="/apartments"{{end }}
    hx-target="#lista-apartments"
    hx-target-error="#alerta-error"
    hx-swap="innerHTML"
    autocomplete="off">

    <div class="mb-3">
        <label class="form-label small fw-medium">Número</label>
        <input type="number" name="number"
            {{ if .is_edit }}value="{{.apartment.Number}}" readonly{{ end }}
            class="form-control {{ if .is_edit }}bg-light{{ end }}"
            placeholder="ej: 301">
        {{ if .is_edit }}<div class="form-text">El número no se puede cambiar.</div>{{ end }}
    </div>

    <div class="mb-3">
        <label class="form-label small fw-medium">Coeficiente</label>
        <input type="number" step="0.0001" name="coeficient"
            {{ if .is_edit }}value="{{.apartment.Coeficient}}"{{ end }}
            class="form-control"
            placeholder="ej: 0.0245">
    </div>

    <div class="mb-3">
        <label class="form-label small fw-medium">Metros cuadrados</label>
        <input type="number" step="0.01" name="meters"
            {{ if .is_edit }}value="{{.apartment.Meters}}"{{ end }}
            class="form-control"
            placeholder="ej: 68.5">
    </div>

    <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary btn-sm">
            {{ if .is_edit }}Guardar cambios{{ else }}Agregar{{ end }}
        </button>
        {{ if .is_edit }}
        <button type="button" class="btn btn-outline-secondary btn-sm"
            hx-get="/apartments/form/0"
            hx-target="#contenedor-formulario"
            hx-target-error="#alerta-error">
            Cancelar
        </button>
        {{ end }}
    </div>

</form>
{{ end }}
