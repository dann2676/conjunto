{{ define "apartment/list" }}

{{ if not .apartments }}
<div class="text-center text-muted py-5">
    <div class="fs-1">🏠</div>
    <p class="mb-0">No hay apartamentos registrados aún.</p>
</div>
{{ else }}
<table class="table table-hover align-middle mb-0">
    <thead class="table-dark">
        <tr>
            <th class="ps-3">Número</th>
            <th>Coeficiente</th>
            <th>Metros</th>
            <th class="text-end pe-3">Acciones</th>
        </tr>
    </thead>
    <tbody>
        {{ range .apartments }}
        <tr>
            <td class="ps-3">
                <span class="badge bg-secondary fs-6">{{ .Number }}</span>
            </td>
            <td class="text-muted">{{ .Coeficient }}</td>
            <td class="text-muted">{{ .Meters }} m²</td>
            <td class="text-end pe-3">
                <button class="btn btn-sm btn-outline-primary me-1"
                    hx-get="/apartments/form/{{.ID}}"
                    hx-target="#contenedor-formulario"
                    hx-target-error="#alerta-error"
                    title="Editar">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="currentColor" class="bi bi-pencil" viewBox="0 0 16 16">
                        <path d="M12.146.146a.5.5 0 0 1 .708 0l3 3a.5.5 0 0 1 0 .708l-10 10a.5.5 0 0 1-.168.11l-5 2a.5.5 0 0 1-.65-.65l2-5a.5.5 0 0 1 .11-.168zM11.207 2.5 13.5 4.793 14.793 3.5 12.5 1.207zm1.586 3L10.5 3.207 4 9.707V10h.5a.5.5 0 0 1 .5.5v.5h.5a.5.5 0 0 1 .5.5v.5h.293zm-9.761 5.175-.106.106-1.528 3.821 3.821-1.528.106-.106A.5.5 0 0 1 5 12.5V12h-.5a.5.5 0 0 1-.5-.5V11h-.5a.5.5 0 0 1-.468-.325"/>
                    </svg>
                </button>
                <button class="btn btn-sm btn-outline-danger"
                    hx-delete="/apartments/{{.ID}}"
                    hx-target="#lista-apartments"
                    hx-target-error="#alerta-error"
                    hx-confirm="¿Eliminar apartamento {{.Number}}?"
                    title="Eliminar">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="currentColor" class="bi bi-trash" viewBox="0 0 16 16">
                        <path d="M5.5 5.5A.5.5 0 0 1 6 6v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5m2.5 0a.5.5 0 0 1 .5.5v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5m3 .5a.5.5 0 0 0-1 0v6a.5.5 0 0 0 1 0z"/>
                        <path d="M14.5 3a1 1 0 0 1-1 1H13v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V4h-.5a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1H6a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1h3.5a1 1 0 0 1 1 1zM4.118 4 4 4.059V13a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V4.059L11.882 4zM2.5 3h11V2h-11z"/>
                    </svg>
                </button>
            </td>
        </tr>
        {{ end }}
    </tbody>
</table>
{{ end }}

{{ end }}
