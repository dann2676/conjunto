{{ define "assembly/already_registered" }}
{{ template "header" . }}

<div class="row justify-content-center">
    <div class="col-md-6 text-center py-5">
        <div class="fs-1 mb-3">ℹ️</div>
        <h4 class="fw-semibold">Ya registraste tu asistencia</h4>
        <p class="text-muted">Tu participación en <strong>{{ .assembly.Title }}</strong> ya fue confirmada anteriormente.</p>

        {{ if .assembly.MeetingURL }}
        <a href="{{ .assembly.MeetingURL }}" target="_blank" class="btn btn-primary mt-2">
            🎥 Unirse a la videollamada
        </a>
        {{ end }}
    </div>
</div>

{{ template "footer" . }}
{{ end }}
