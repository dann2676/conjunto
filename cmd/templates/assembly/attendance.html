{{ define "assembly/attendance" }}
{{ template "header" . }}

<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="text-center mb-4">
            <h4 class="fw-semibold">{{ .assembly.Title }}</h4>
            <p class="text-muted">{{ .assembly.Date.Format "02/01/2006" }}</p>
            {{ if .assembly.MeetingURL }}
            <a href="{{ .assembly.MeetingURL }}" target="_blank" class="btn btn-primary mb-3">
                🎥 Unirse a la videollamada
            </a>
            {{ end }}
        </div>

        <div class="card shadow-sm">
            <div class="card-header fw-semibold">📝 Registro de asistencia</div>
            <div class="card-body">

                <div id="alerta-error"></div>

                <form hx-post="/assemblies/{{ .assembly.Slug }}/attendance/lookup"
                    hx-target="#resultado-busqueda"
                    hx-target-error="#alerta-error"
                    hx-swap="innerHTML"
                    autocomplete="off">

                    <div class="mb-3">
                        <label class="form-label fw-medium">Número de cédula</label>
                        <div class="input-group">
                            <input type="text" name="identification"
                                class="form-control form-control-lg"
                                placeholder="ej: 10324677"
                                required>
                            <button type="submit" class="btn btn-primary">
                                Buscar
                            </button>
                        </div>
                        <div class="form-text">Ingrese su cédula para continuar</div>
                    </div>

                </form>

                <div id="resultado-busqueda"></div>

            </div>
        </div>
    </div>
</div>

{{ template "footer" . }}
{{ end }}
